<!doctype html>
<html lang="es" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="JavaScript Lab: aprende JavaScript escribiendo código, resolviendo retos y construyendo proyectos."
    />
    <title>JavaScript Lab — Aprende haciendo</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#main-content">Saltar al contenido</a>

    <svg class="svg-sprite" aria-hidden="true">
      <symbol id="icon-home" viewBox="0 0 24 24"><path d="m3 11 9-8 9 8v9a1 1 0 0 1-1 1h-5v-7H9v7H4a1 1 0 0 1-1-1z"/></symbol>
      <symbol id="icon-code" viewBox="0 0 24 24"><path d="m8 9-4 3 4 3m8-6 4 3-4 3m-2-9-4 12"/></symbol>
      <symbol id="icon-map" viewBox="0 0 24 24"><path d="m3 6 6-3 6 3 6-3v15l-6 3-6-3-6 3zM9 3v15m6-12v15"/></symbol>
      <symbol id="icon-trophy" viewBox="0 0 24 24"><path d="M8 4h8v5a4 4 0 0 1-8 0zm4 9v5m-4 3h8M5 6H3v2a4 4 0 0 0 4 4m12-6h2v2a4 4 0 0 1-4 4"/></symbol>
      <symbol id="icon-play" viewBox="0 0 24 24"><path d="m8 5 11 7-11 7z"/></symbol>
      <symbol id="icon-check" viewBox="0 0 24 24"><path d="m5 12 4 4L19 6"/></symbol>
      <symbol id="icon-lock" viewBox="0 0 24 24"><rect x="5" y="10" width="14" height="11" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></symbol>
      <symbol id="icon-light" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2m0 16v2M4.9 4.9l1.4 1.4m11.4 11.4 1.4 1.4M2 12h2m16 0h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></symbol>
      <symbol id="icon-menu" viewBox="0 0 24 24"><path d="M4 7h16M4 12h16M4 17h16"/></symbol>
      <symbol id="icon-close" viewBox="0 0 24 24"><path d="m6 6 12 12M18 6 6 18"/></symbol>
      <symbol id="icon-terminal" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="m7 9 3 3-3 3m6 0h4"/></symbol>
      <symbol id="icon-hint" viewBox="0 0 24 24"><path d="M9 18h6m-5 3h4m-6.5-7.5a6 6 0 1 1 9 0C15.5 14.5 15 15.5 15 17H9c0-1.5-.5-2.5-1.5-3.5Z"/></symbol>
      <symbol id="icon-reset" viewBox="0 0 24 24"><path d="M4 4v6h6M5.5 17.5a8 8 0 1 0-.8-10.2L4 10"/></symbol>
      <symbol id="icon-arrow" viewBox="0 0 24 24"><path d="M5 12h14m-6-6 6 6-6 6"/></symbol>
      <symbol id="icon-book" viewBox="0 0 24 24"><path d="M4 5a3 3 0 0 1 3-3h13v17H7a3 3 0 0 0-3 3zm0 0v17m4-15h8"/></symbol>
      <symbol id="icon-bolt" viewBox="0 0 24 24"><path d="m13 2-8 12h7l-1 8 8-12h-7z"/></symbol>
      <symbol id="icon-download" viewBox="0 0 24 24"><path d="M12 3v12m0 0 4-4m-4 4-4-4M5 21h14"/></symbol>
      <symbol id="icon-upload" viewBox="0 0 24 24"><path d="M12 21V9m0 0 4 4m-4-4-4 4M5 3h14"/></symbol>
    </svg>

    <div class="app-shell">
      <header class="topbar">
        <button class="icon-button mobile-only" id="menu-button" aria-label="Abrir ruta de aprendizaje" aria-expanded="false">
          <svg><use href="#icon-menu"></use></svg>
        </button>
        <button class="brand" id="brand-button" aria-label="Ir al inicio">
          <span class="brand-mark">JS</span>
          <span class="brand-copy"><strong>JavaScript Lab</strong><small>Aprende haciendo</small></span>
        </button>
        <div class="topbar-progress" aria-label="Progreso general">
          <span id="header-progress-label">0% completado</span>
          <div class="progress-track"><span id="header-progress-bar"></span></div>
        </div>
        <button class="icon-button" id="theme-button" aria-label="Cambiar tema">
          <svg><use href="#icon-light"></use></svg>
        </button>
      </header>

      <aside class="sidebar" id="sidebar" aria-label="Ruta de aprendizaje">
        <div class="sidebar-header">
          <div>
            <span class="eyebrow">TU RUTA</span>
            <h2>De cero a constructor</h2>
          </div>
          <button class="icon-button mobile-only" id="close-menu-button" aria-label="Cerrar ruta">
            <svg><use href="#icon-close"></use></svg>
          </button>
        </div>
        <nav id="course-navigation"></nav>
        <div class="sidebar-data">
          <button class="sidebar-data-button" id="export-progress-button">
            <svg><use href="#icon-download"></use></svg>
            Exportar progreso
          </button>
          <button class="sidebar-data-button" id="import-progress-button">
            <svg><use href="#icon-upload"></use></svg>
            Importar progreso
          </button>
          <input type="file" id="import-file" accept="application/json,.json" hidden />
        </div>
        <button class="sidebar-reset" id="reset-progress-button">
          <svg><use href="#icon-reset"></use></svg>
          Reiniciar progreso
        </button>
      </aside>

      <div class="sidebar-scrim" id="sidebar-scrim"></div>
      <main id="main-content" tabindex="-1"></main>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script src="js/content.js"></script>
    <script src="js/expansion-content.js"></script>
    <script src="js/academic-content.js"></script>
    <script src="js/runner.js"></script>
    <script src="js/validator.js"></script>
    <script src="js/editor.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
